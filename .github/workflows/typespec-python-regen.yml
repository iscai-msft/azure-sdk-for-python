name: TypeSpec Python Regen Tests

on:
  # Triggered by microsoft/typespec when http-client-python merges to main
  repository_dispatch:
    types: [typespec-python-regen]
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      typespec_ref:
        description: "Git ref of microsoft/typespec to regenerate from (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: "Regenerate TypeSpec Python tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout azure-sdk-for-python
        uses: actions/checkout@v6

      - name: Determine typespec ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "ref=${{ github.event.client_payload.sha || 'main' }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.event.inputs.typespec_ref || 'main' }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout microsoft/typespec
        uses: actions/checkout@v6
        with:
          repository: microsoft/typespec
          ref: ${{ steps.ref.outputs.ref }}
          path: typespec

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build http-client-python
        working-directory: typespec/packages/http-client-python
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Prepare Python environment
        working-directory: typespec/packages/http-client-python
        run: |
          npm run install
          npm run prepare

      - name: Regenerate tests
        working-directory: typespec/packages/http-client-python
        run: npm run regenerate

      - name: Copy regenerated tests
        run: |
          set -euo pipefail
          TARGET="eng/tools/typespec-python-generated-tests"
          rm -rf "$TARGET/azure" "$TARGET/unbranded"
          mkdir -p "$TARGET"
          cp -r typespec/packages/http-client-python/tests/generated/azure "$TARGET/azure"
          cp -r typespec/packages/http-client-python/tests/generated/unbranded "$TARGET/unbranded"

      - name: Clean up typespec checkout
        run: rm -rf typespec

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/typespec-python-regen
          base: main
          delete-branch: true
          add-paths: eng/tools/typespec-python-generated-tests/**
          title: "[typespec-python] Regenerate tests from http-client-python"
          body: |
            Automated regeneration of TypeSpec Python generated tests.

            - Source: `microsoft/typespec` @ `${{ steps.ref.outputs.ref }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This PR was auto-generated.
          commit-message: |
            [typespec-python] Regenerate tests from http-client-python

            Source: microsoft/typespec@${{ steps.ref.outputs.ref }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --auto --squash
