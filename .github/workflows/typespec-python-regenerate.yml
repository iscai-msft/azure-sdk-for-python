name: TypeSpec Python Regenerate Tests

on:
  # Triggered by microsoft/typespec when http-client-python merges to main
  repository_dispatch:
    types: [typespec-python-regenerate]
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      typespec_ref:
        description: "Git ref of microsoft/typespec to regenerate from (branch, tag, or SHA)"
        required: false
        default: "main"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: "Regenerate TypeSpec Python tests"
    runs-on: ubuntu-latest
    steps:
      - name: Validate dispatch sender
        if: github.event_name == 'repository_dispatch'
        run: |
          SENDER="${{ github.event.sender.login }}"
          # Only allow dispatches from the microsoft/typespec CI bot or org members
          if [[ "$SENDER" != "github-actions[bot]" && "$SENDER" != "azure-sdk" ]]; then
            echo "::warning::Unexpected dispatch sender: $SENDER"
          fi

      - name: Checkout azure-sdk-for-python
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout microsoft/typespec
        uses: actions/checkout@v6
        with:
          repository: microsoft/typespec
          ref: ${{ github.event_name == 'repository_dispatch' && (github.event.client_payload.sha || 'main') || (github.event.inputs.typespec_ref || 'main') }}
          path: typespec

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build http-client-python
        working-directory: typespec/packages/http-client-python
        run: |
          npm install --ignore-scripts
          npm run build

      - name: Prepare Python environment
        working-directory: typespec/packages/http-client-python
        run: |
          npm run install
          npm run prepare

      - name: Regenerate tests
        working-directory: typespec/packages/http-client-python
        run: npm run regenerate

      - name: Copy regenerated tests
        run: |
          set -euo pipefail
          TARGET="eng/tools/tsp-python-gen"
          rm -rf "$TARGET/azure" "$TARGET/unbranded"
          mkdir -p "$TARGET"
          cp -r typespec/packages/http-client-python/tests/generated/azure "$TARGET/azure"
          cp -r typespec/packages/http-client-python/tests/generated/unbranded "$TARGET/unbranded"

      - name: Clean up typespec checkout
        run: rm -rf typespec

      - name: Determine source ref for PR metadata
        id: source-ref
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.sha || 'main' }}"
          else
            REF="${{ github.event.inputs.typespec_ref || 'main' }}"
          fi
          # Sanitize: strip newlines and control characters
          REF=$(echo "$REF" | tr -d '\n\r')
          echo "ref=$REF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/typespec-python-regenerate
          base: main
          delete-branch: true
          add-paths: eng/tools/tsp-python-gen/**
          title: "[typespec-python] Regenerate tests from http-client-python"
          body: |
            Automated regeneration of TypeSpec Python generated tests.

            - Source: `microsoft/typespec` @ `${{ steps.source-ref.outputs.ref }}`
            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This PR was auto-generated.
          commit-message: |
            [typespec-python] Regenerate tests from http-client-python

            Source: microsoft/typespec@${{ steps.source-ref.outputs.ref }}

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number && github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} \
            --auto --squash
